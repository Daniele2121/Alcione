workflows:
  ios-workflow:
    name: iOS TestFlight Build
    instance_type: mac_mini_m2
    max_build_duration: 120
    integrations:
      app_store_connect: "Chiave Alcione"
    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials
      vars:
        BUNDLE_ID: "it.alcione.scouting"
        XCODE_SCHEME: "Runner"

    scripts:
      - name: Set up keychain and provisioning profiles
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Flutter Get and Precache
        script: |
          flutter pub get
          flutter precache --ios

      - name: Force Generate Flutter Config
        script: |
          # Ci spostiamo nella cartella ios
          cd ios
          # Creiamo la cartella Flutter se non esiste
          mkdir -p Flutter
          # Iniettiamo manualmente le variabili che il tuo Podfile sta cercando
          echo "FLUTTER_ROOT=$FLUTTER_ROOT" > Flutter/Generated.xcconfig
          echo "FLUTTER_APPLICATION_PATH=$FCI_BUILD_DIR" >> Flutter/Generated.xcconfig
          # Ora eseguiamo l'installazione dei Pods
          pod install --repo-update
          cd ..

      - name: Flutter Build IPA
        script: |
          BUILD_NUMBER_FINAL=$(($PROJECT_BUILD_NUMBER + 10))
          
          # Costruiamo l'IPA senza firmarlo (ci pensa il publishing)
          # Usiamo --no-pod-install perché li abbiamo già fatti sopra
          flutter build ipa --release \
            --build-name="1.0.0" \
            --build-number=$BUILD_NUMBER_FINAL \
            --no-codesign \
            --no-pod-install

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true