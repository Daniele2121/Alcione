workflows:
  ios-workflow:
    name: iOS Build & TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: GitHub_Actions_Key
    environment:
      groups:
        - app_store_credentials
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "it.alcione.scouting"
    scripts:
      - name: Set up code signing
        script: |
          # 1. Inizializza il portachiavi
          keychain initialize
          
          # 2. Decodifica il certificato P12 (.p12) usando il tuo nome variabile
          echo $CERTIFICATE_PRIVATE_KEY | base64 --decode > /tmp/certificate.p12
          
          # 3. Aggiunge il certificato (Assicurati di avere una variabile per la password del .p12)
          # Se la password si chiama diversamente, cambia $CM_CERTIFICATE_PASSWORD qui sotto
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
          
          # 4. Installa il Provisioning Profile (.mobileprovision)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo $APP_STORE_PROVISIONING_PROFILE | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          
          # 5. Pulizia Xcode per firma manuale
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = ".*";/PROVISIONING_PROFILE_SPECIFIER = "";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = ".*";/CODE_SIGN_STYLE = "Manual";/g' ios/Runner.xcodeproj/project.pbxproj
          
          # 6. Genera configurazione di export usando le tue chiavi API
          xcode-project use-profiles --issuer-id $APP_STORE_CONNECT_ISSUER_ID --key-id $APP_STORE_CONNECT_KEY_ID --api-key $APP_STORE_PRIVATE_KEY

      - name: Install pods
        script: |
          cd ios
          rm -rf Pods Podfile.lock Runner.xcworkspace
          pod install --repo-update
          cd ..

      - name: Build IPA and FIX CRASH
        script: |
          flutter clean
          flutter pub get
          
          # Build dell'IPA
          flutter build ipa --release \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

          # FIX ANTI-CRASH
          APP_PATH=$(find build/ios/archive -name "*.app")
          if [ -d "$APP_PATH/Frameworks" ]; then
            rm -rf "$APP_PATH/Frameworks/"*
            echo "Frameworks puliti."
          fi

    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true