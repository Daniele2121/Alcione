workflows:
  ios-testflight-workflow:
    name: iOS TestFlight Build
    max_build_duration: 120
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: "Chiave Alcione" # Usiamo la tua chiave specifica

    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials # Assicurati che questo gruppo esista nelle variabili di Codemagic

    scripts:
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Install Pods
        script: |
          cd ios
          pod install
      - name: Flutter build ipa
        script: |
          # Costruisce l'app per la distribuzione
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true