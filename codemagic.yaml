workflows:
  ios-workflow:
    name: iOS TestFlight Build
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials # Il nome del gruppo di variabili che hai creato su Codemagic
      vars:
        BUNDLE_ID: "it.alcione.scouting"

    scripts:
      - name: Flutter Clean and Get
        script: |
          flutter clean
          flutter pub get

      - name: Prepare iOS Configuration
        script: |
          # Crea i file ponte per sbloccare la compilazione da Windows
          touch ios/Runner/GeneratedPluginRegistrant.h
          touch ios/Runner/GeneratedPluginRegistrant.m
          flutter precache --ios

      - name: Install CocoaPods
        script: |
          cd ios
          rm -rf Pods
          rm -rf Podfile.lock
          rm -f Flutter/Generated.xcconfig
          # Rigenera la config nativa del Mac per evitare FLUTTER_ROOT not found
          flutter build ios --config-only --no-codesign
          pod install --repo-update
          cd ..

      - name: Flutter Build iOS
        script: |
          # Compila l'IPA. La firma verrà gestita da Codemagic nel post-processo
          flutter build ios --release --no-codesign --build-number=$BUILD_NUMBER

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        # Usiamo le variabili dirette così non serve l'integrazione "Alcione"
        auth: manual
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        key_id: $APP_STORE_CONNECT_KEY_ID
        certificate_key: $APP_STORE_CONNECT_PRIVATE_KEY
        submit_to_testflight: true