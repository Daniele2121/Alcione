workflows:
  ios-testflight-workflow:
    name: iOS TestFlight Build
    max_build_duration: 120
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: "Chiave Alcione"

    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials

    scripts:
      - name: Flutter Clean and Get
        script: |
          flutter clean
          flutter pub get
      - name: Install Pods
        script: |
          cd ios
          pod install --repo-update
      - name: Flutter build ipa
        script: |
          # Usiamo 'precompile' per assicurarci che i moduli esistano prima dell'archiviazione
          flutter build ios --release --no-codesign
          
          # Applichiamo la correzione UN SECONDO PRIMA della build finale
          sed -i '' 's/@import cloud_firestore;/#import <cloud_firestore\/FLTFirebaseFirestorePlugin.h>/' ios/Runner/GeneratedPluginRegistrant.m
          sed -i '' 's/@import firebase_auth;/#import <firebase_auth\/FLTFirebaseAuthPlugin.h>/' ios/Runner/GeneratedPluginRegistrant.m
          sed -i '' 's/@import firebase_core;/#import <firebase_core\/FLTFirebaseCorePlugin.h>/' ios/Runner/GeneratedPluginRegistrant.m
          
          # Build finale con il flag che forza Xcode a ignorare gli errori di moduli non trovati
          flutter build ipa --release --no-codesign --extra-front-end-options=--ignore-undefined-symbols

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true