workflows:
  ios-testflight-workflow:
    name: iOS TestFlight Build
    max_build_duration: 120
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: "Chiave Alcione"

    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials

    scripts:
      - name: Flutter Clean and Get
        script: |
          flutter clean
          flutter pub get
          # Questo comando è vitale: genera i file .xcconfig necessari ai Pods
          flutter build ios --config-only
      - name: Install Pods
        script: |
          cd ios
          # Rimuoviamo i residui di Windows
          rm -rf Pods
          rm -rf Podfile.lock
          # Ora che flutter build ios --config-only è passato, questo funzionerà
          pod install --repo-update
          cd ..
      - name: Flutter Build iOS
        script: |
          # Creiamo i file ponte per sicurezza
          touch ios/Runner/GeneratedPluginRegistrant.h
          touch ios/Runner/GeneratedPluginRegistrant.m
          
          # Build finale
          flutter build ios --release --no-codesign --build-number=$BUILD_NUMBER
    artifacts:
      - build/ios/iphoneos/*.app
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true