workflows:
  ios-testflight-workflow:
    name: iOS TestFlight Build
    max_build_duration: 120
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: "Chiave Alcione"

    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials

    scripts:
      - name: Flutter Clean and Repair
        script: |
          flutter clean
          flutter pub get
          # Forziamo la rigenerazione dei file iOS
          flutter build ios --release --no-codesign --config-only
      - name: Hard Reset Pods
        script: |
          cd ios
          rm -rf Pods
          rm -rf Podfile.lock
          # Questo comando è magico per Firebase
          pod cache clean --all
          pod install --repo-update
      - name: Flutter build ipa
        script: |
          # Costruiamo l'IPA forzando l'uso dei moduli
          flutter build ipa --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true