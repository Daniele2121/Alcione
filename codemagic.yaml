workflows:
  ios-workflow:
    name: iOS TestFlight Build
    instance_type: mac_mini_m2
    max_build_duration: 120
    integrations:
      app_store_connect: "Chiave Alcione"
    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials
      vars:
        BUNDLE_ID: "it.alcione.scouting"
        XCODE_SCHEME: "Runner"

    scripts:
      - name: Set up keychain and provisioning profiles
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA (Safe Mode)
        script: |
          # 1. Preparazione Flutter
          flutter pub get
          flutter precache --ios
          
          # 2. CREAZIONE MANUALE DEL FILE CONFIG (Come richiesto dal tuo Podfile)
          # Il tuo Podfile cerca in: ios/Flutter/Generated.xcconfig
          mkdir -p ios/Flutter
          echo "FLUTTER_ROOT=$FLUTTER_ROOT" > ios/Flutter/Generated.xcconfig
          echo "FLUTTER_APPLICATION_PATH=$FCI_BUILD_DIR" >> ios/Flutter/Generated.xcconfig
          
          # 3. Pulizia e installazione Pods
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update
          cd ..
          
          # 4. Build finale dell'IPA (senza firma, la farà il publishing)
          BUILD_NUMBER_FINAL=$(($PROJECT_BUILD_NUMBER + 10))
          flutter build ipa --release \
            --build-name="1.0.0" \
            --build-number=$BUILD_NUMBER_FINAL \
            --no-codesign \
            --no-pod-install # Usiamo questo ora che i pod sono OK

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true