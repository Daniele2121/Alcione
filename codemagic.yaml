workflows:
  ios-workflow:
    name: iOS Build & TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: GitHub_Actions_Key
    environment:
      groups:
        - app_store_credentials
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "it.alcione.scouting"
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          
          # 1. Decodifica il certificato P12
          echo "$CERTIFICATE_PRIVATE_KEY" | base64 --decode > /tmp/certificate.p12
          
          # 2. Importa il certificato usando la password configurata
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password "$APP_STORE_CONNECT_PASSWORD"
          
          # 3. Installa il Provisioning Profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$APP_STORE_PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          
          # 4. Forza la firma manuale nel progetto Xcode
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = ".*";/PROVISIONING_PROFILE_SPECIFIER = "";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = ".*";/CODE_SIGN_STYLE = "Manual";/g' ios/Runner.xcodeproj/project.pbxproj
          
          # 5. Prepara le opzioni di export
          xcode-project use-profiles

      - name: Install pods
        script: |
          cd ios
          rm -rf Pods Podfile.lock Runner.xcworkspace
          pod install --repo-update
          cd ..

      - name: Build IPA and FIX CRASH
        script: |
          flutter clean
          flutter pub get
          
          # 1. Costruiamo l'app iOS (senza firma per evitare conflitti iniziali)
          flutter build ios --release --build-number=$BUILD_NUMBER --no-codesign

          # 2. FIX STRUTTURA BUNDLE (Risolve Errore 409 Apple)
          # Eliminiamo il file binario duplicato che causa il rifiuto del caricamento
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ -d "$APP_PATH/Frameworks/App.framework" ]; then
            echo "Riparazione bundle App.framework prima dell'export..."
            rm -f "$APP_PATH/Frameworks/App.framework/App"
            echo "Riparazione completata."
          fi

          # 3. Generiamo l'IPA finale usando le export-options preparate
          # Usiamo il comando standard che funziona su tutte le versioni di Flutter
          mkdir -p build/ios/ipa
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist

          # 4. Rinominiamo il file per assicurarci che Codemagic lo trovi per il publishing
          mv build/ios/ipa/*.ipa build/ios/ipa/alcione_scouting.ipa

    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true