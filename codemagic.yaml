workflows:
  ios-testflight-workflow:
    name: iOS TestFlight Build
    max_build_duration: 120
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: "Chiave Alcione"

    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials

    scripts:
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Install Pods
        script: |
          # Pulizia profonda dei Pods per evitare il problema 'Module not found'
          cd ios
          rm -rf Pods
          rm -rf Podfile.lock
          pod deintegrate
          pod repo update
          pod install
      - name: Flutter build ipa
        script: |
          # Build dell'archivio senza firma (ci pensa Codemagic dopo)
          flutter build ipa --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true