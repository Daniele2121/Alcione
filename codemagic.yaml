workflows:
  ios-workflow:
    name: iOS Build & TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: GitHub_Actions_Key
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "it.alcione.scouting"
    scripts:
      - name: Set up code signing
        script: |
          # 1. Inizializza portachiavi e scarica certificati
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --install
          keychain add-certificates
          
          # 2. Rimuove forzatamente i nomi dei profili hardcoded nel pbxproj per evitare l'errore "No profile found"
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = ".*";/PROVISIONING_PROFILE_SPECIFIER = "";/g' ios/Runner.xcodeproj/project.pbxproj
          
          # 3. Forza Xcode a usare i profili appena scaricati da Codemagic
          xcode-project use-profiles --force-quiet

      - name: Install pods
        script: |
          cd ios
          rm -rf Pods Podfile.lock Runner.xcworkspace
          pod install --repo-update
          cd ..

      - name: Build IPA and FIX CRASH
        script: |
          flutter clean
          flutter pub get
          
          # Build dell'IPA usando il file export_options generato da Codemagic
          flutter build ipa --release \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

          # FIX ANTI-CRASH: Rimuove i framework statici duplicati che bloccano l'app all'avvio
          APP_PATH=$(find build/ios/archive -name "*.app")
          if [ -d "$APP_PATH/Frameworks" ]; then
            rm -rf "$APP_PATH/Frameworks/"*
            echo "Cartella Frameworks pulita con successo."
          fi

    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true