workflows:
  ios-workflow:
    name: iOS Build & TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: GitHub_Actions_Key
    environment:
      groups:
        - app_store_credentials
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "it.alcione.scouting"
    scripts:
      - name: Set up code signing
        script: |
            keychain initialize
            echo "$CERTIFICATE_PRIVATE_KEY" | base64 --decode > /tmp/certificate.p12
            keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password "$APP_STORE_CONNECT_PASSWORD"
            
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            echo "$APP_STORE_PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
            
            # 1. Rimuove il riferimento a AppFrameworkInfo.plist dalle Resources (causa comune del 409)
            sed -i '' '/AppFrameworkInfo.plist in Resources/d' ios/Runner.xcodeproj/project.pbxproj
            
            # 2. Forza il tipo di Mach-O per il target principale
            sed -i '' 's/MACH_O_TYPE = mh_execute;/MACH_O_TYPE = mh_execute; ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES = YES;/g' ios/Runner.xcodeproj/project.pbxproj
            
            # 3. Pulizia standard firme
            sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = ".*";/PROVISIONING_PROFILE_SPECIFIER = "";/g' ios/Runner.xcodeproj/project.pbxproj
            sed -i '' 's/CODE_SIGN_STYLE = ".*";/CODE_SIGN_STYLE = "Manual";/g' ios/Runner.xcodeproj/project.pbxproj
            
            xcode-project use-profiles

      - name: Install pods
        script: |
          cd ios
          # Pulizia totale per evitare conflitti di configurazione
          rm -rf Pods Podfile.lock .symlinks Runner.xcworkspace
          flutter pub get
          pod install --repo-update
          cd ..

      - name: Build IPA
        script: |
            flutter clean
            flutter pub get
            
            # 1. Prepariamo i file
            flutter build ios --release --build-number=130 --no-codesign
            
            # 2. Creiamo l'archivio
            mkdir -p build/ios/archive
            xcodebuild -workspace ios/Runner.xcworkspace \
              -scheme Runner \
              -configuration Release \
              -archivePath build/ios/archive/Runner.xcarchive \
              archive
            
            # 3. PULIZIA E ALLINEAMENTO (Fix Errore 409 + No Architectures)
            echo "Eseguo chirurgia sul bundle per conformità Apple Store..."
            
            # Troviamo il percorso del framework nell'archivio
            FRAMEWORK_PATH=$(find build/ios/archive/Runner.xcarchive -name "App.framework" -type d)
            
            if [ -d "$FRAMEWORK_PATH" ]; then
              # Rimuoviamo il binario illegale
              rm -f "$FRAMEWORK_PATH/App"
            
              # MODIFICA CRUCIALE: Rimuoviamo la chiave CFBundleExecutable dal file Info.plist del framework
              # Questo dice ad Apple: "Questo framework non ha un binario, non cercarlo."
              /usr/libexec/PlistBuddy -c "Delete :CFBundleExecutable" "$FRAMEWORK_PATH/Info.plist" || true
            
              echo "Pulizia completata con successo."
            else
              echo "ERRORE: App.framework non trovato!"
              exit 1
            fi
            
            # 4. Esportiamo l'IPA
            xcodebuild -exportArchive \
              -archivePath build/ios/archive/Runner.xcarchive \
              -exportOptionsPlist /Users/builder/export_options.plist \
              -exportPath build/ios/ipa
            
            # Rinominiamo l'output
            find build/ios/ipa -name "*.ipa" -exec mv {} build/ios/ipa/alcione_scouting.ipa \;
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true