workflows:
  ios-workflow:
    name: iOS Build & TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: GitHub_Actions_Key
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "it.alcione.scouting"
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --install
          keychain add-certificates
          xcode-project use-profiles

      - name: Install pods
        script: |
          cd ios
          rm -rf Pods Podfile.lock Runner.xcworkspace
          pod install --repo-update
          cd ..

      - name: Build IPA and FIX CRASH
        script: |
          # 1. Pulizia e pacchetti
          flutter clean
          flutter pub get
          
          # 2. Build dell'IPA firmato (Usa i profili scaricati sopra)
          # Flutter cercherà automaticamente il file export_options generato da xcode-project use-profiles
          flutter build ipa --release \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

          # 3. FIX ANTI-CRASH
          # Puliamo i framework statici che causano il crash al lancio su iOS
          APP_PATH=$(find build/ios/archive -name "*.app")
          if [ -d "$APP_PATH/Frameworks" ]; then
            rm -rf "$APP_PATH/Frameworks/"*
            echo "Cartella Frameworks pulita con successo per prevenire crash."
          fi

    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true