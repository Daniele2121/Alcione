workflows:
  ios-workflow:
    name: iOS TestFlight Build
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials # Verifica che le variabili siano in questo gruppo
      vars:
        BUNDLE_ID: "it.alcione.scouting"
        XCODE_SCHEME: "Runner"

    scripts:
      - name: Set up keychain and provisioning profiles
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Flutter Get and Precache
        script: |
          flutter pub get
          flutter precache --ios

      - name: Install CocoaPods
        script: |
          cd ios
          rm -rf Pods Podfile.lock Flutter/Generated.xcconfig
          flutter build ios --config-only
          pod install --repo-update
          cd ..

      - name: Flutter Build IPA
        script: |
          # Calcola il numero di build automatico (Build attuale + 10)
          BUILD_NUMBER_FINAL=$(($PROJECT_BUILD_NUMBER + 10))
          
          # CORREZIONE: Comando fondamentale per generare l'IPA firmato
          flutter build ipa --release \
            --build-name="1.0.0" \
            --build-number=$BUILD_NUMBER_FINAL \
            --export-options-plist=$HOME/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        key_id: $APP_STORE_CONNECT_KEY_ID
        certificate_key: $APP_STORE_CONNECT_PRIVATE_KEY
        submit_to_testflight: true
        beta_testers:
          - il_tuo_gruppo_test@email.it