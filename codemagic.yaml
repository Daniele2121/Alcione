workflows:
  ios-workflow:
    name: iOS Build & TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: GitHub_Actions_Key
    environment:
      groups:
        - app_store_credentials
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "it.alcione.scouting"
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          # Pulizia profonda delle vecchie configurazioni di firma
          keychain add-certificates
          xcode-project use-profiles

      - name: Install pods
        script: |
          # Pulizia radicale per evitare il "custom config set" error
          cd ios
          rm -rf Pods Podfile.lock .symlinks Runner.xcworkspace
          # Forza l'uso delle configurazioni di Flutter
          flutter pub get
          pod install --repo-update
          cd ..

      - name: Build IPA
        script: |
          # Pulizia Xcode per evitare file binari "standalone" nel bundle
          xcodebuild clean -workspace ios/Runner.xcworkspace -scheme Runner
          
          # Build IPA pulita
          flutter build ipa --release \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist
          
          # Rinomina per l'artefatto
          mkdir -p build/ios/ipa
          mv build/ios/ipa/*.ipa build/ios/ipa/alcione_scouting.ipa
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true