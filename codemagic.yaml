workflows:
  ios-workflow:
    name: iOS Build & TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: GitHub_Actions_Key
    environment:
      groups:
        - app_store_credentials
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "it.alcione.scouting"
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          
          # Decodifica il certificato P12
          echo "$CERTIFICATE_PRIVATE_KEY" | base64 --decode > /tmp/certificate.p12
          
          # Importa il certificato usando la password che hai appena aggiunto
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password "$APP_STORE_CONNECT_PASSWORD"
          
          # Installa il Provisioning Profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$APP_STORE_PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          
          # Pulisce i riferimenti Xcode per forzare la firma manuale
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = ".*";/PROVISIONING_PROFILE_SPECIFIER = "";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = ".*";/CODE_SIGN_STYLE = "Manual";/g' ios/Runner.xcodeproj/project.pbxproj
          
          # Applica i profili
          xcode-project use-profiles
      - name: Install pods
        script: |
          cd ios
          rm -rf Pods Podfile.lock Runner.xcworkspace
          pod install --repo-update
          cd ..

      - name: Build IPA and FIX CRASH
        script: |
          flutter clean
          flutter pub get
          
          # 1. Creiamo solo l'archivio (senza generare l'IPA ancora)
          flutter build ios --release --build-number=$BUILD_NUMBER --no-codesign

          # 2. FIX STRUTTURA BUNDLE
          # Entriamo nell'app compilata prima che venga impacchettata
          APP_PATH="build/ios/iphoneos/Runner.app"
          
          if [ -d "$APP_PATH/Frameworks/App.framework" ]; then
            echo "Riparazione bundle App.framework..."
            # Rimuoviamo il binario duplicato che Apple non vuole
            rm -f "$APP_PATH/Frameworks/App.framework/App"
            echo "Riparazione completata."
          fi

          # 3. Generiamo l'IPA dall'app riparata
          # Usiamo l'export-options-plist generato nello step di firma
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true