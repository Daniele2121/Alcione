workflows:
  ios-workflow:
    name: iOS Build & TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: GitHub_Actions_Key
    environment:
      groups:
        - app_store_credentials
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "it.alcione.scouting"
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          
          # Decodifica e installa certificato
          echo "$CERTIFICATE_PRIVATE_KEY" | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password "$APP_STORE_CONNECT_PASSWORD"
          
          # Installazione Profilo di Provvigionamento
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$APP_STORE_PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          
          # PULIZIA PBXPROJ: Rimuove riferimenti a Team e Profili locali del tuo Mac
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = ".*";/PROVISIONING_PROFILE_SPECIFIER = "";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/PROVISIONING_PROFILE = ".*";/PROVISIONING_PROFILE = "";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = ".*";/CODE_SIGN_STYLE = "Manual";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = ".*";/DEVELOPMENT_TEAM = "";/g' ios/Runner.xcodeproj/project.pbxproj
          
          # Applica i profili caricati al progetto Xcode
          xcode-project use-profiles

      - name: Install pods
        script: |
          cd ios
          # Pulizia totale per evitare conflitti di configurazione
          rm -rf Pods Podfile.lock .symlinks Runner.xcworkspace
          flutter pub get
          pod install --repo-update
          cd ..

      - name: Build IPA
        script: |
            # 1. Pulizia e Build standard
            xcodebuild clean -workspace ios/Runner.xcworkspace -scheme Runner
            flutter build ipa --release --build-number=$BUILD_NUMBER --export-options-plist=/Users/builder/export_options.plist
            
            # 2. Prepariamo l'IPA per l'intervento
            mkdir -p build/ios/ipa
            IPA_PATH=$(find build/ios/ipa -name "*.ipa")
            
            # 3. AGGIRAMENTO MANUALE (Unzip -> Fix -> Zip)
            echo "Inizio intervento chirurgico sull'IPA..."
            unzip -q "$IPA_PATH" -d temp_ipa
            
            # Rimuoviamo i file binari che Apple scambia per eseguibili standalone
            # ma che sono già inclusi correttamente nel framework
            find temp_ipa -name "App.framework" -exec /usr/libexec/PlistBuddy -c "Delete :CFBundleExecutable" "{}/Info.plist" \; 2>/dev/null || true
            
            # Ricreiamo l'IPA corretta
            cd temp_ipa
            zip -qr ../fixed_alcione.ipa .
            cd ..
            
            # Sostituiamo l'IPA originale con quella corretta
            mv fixed_alcione.ipa build/ios/ipa/alcione_scouting.ipa
            rm -rf temp_ipa
            
            echo "Intervento completato. IPA pronta per il caricamento."
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true