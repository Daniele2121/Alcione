workflows:
  ios-testflight-workflow:
    name: iOS TestFlight Build
    max_build_duration: 120
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: "Chiave Alcione"

    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials

    scripts:
      - name: Flutter Clean and Repair
        script: |
          flutter clean
          flutter pub get
          # Rigenera i file di configurazione iOS
          flutter build ios --release --no-codesign --config-only
      - name: Hard Reset Pods and Cache
        script: |
          cd ios
          rm -rf Pods
          rm -rf Podfile.lock
          # Pulizia profonda della cache di CocoaPods
          pod cache clean --all
          pod repo update
          pod install
      - name: Flutter build ipa
        script: |
          # Build finale dell'IPA
          flutter build ipa --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true