workflows:
  ios-workflow:
    name: iOS Build & TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: GitHub_Actions_Key
    environment:
      groups:
        - app_store_credentials
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "it.alcione.scouting"
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          echo "$CERTIFICATE_PRIVATE_KEY" | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password "$APP_STORE_CONNECT_PASSWORD"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$APP_STORE_PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          
          /usr/libexec/PlistBuddy -c "Delete :UIMainStoryboardFile" ios/Runner/Info.plist || true
          sed -i '' '/AppFrameworkInfo.plist in Resources/d' ios/Runner.xcodeproj/project.pbxproj
          
          xcode-project use-profiles

      - name: Build IPA
        script: |
          flutter clean
          flutter pub get
          
          cd ios
          rm -rf Pods Podfile.lock Runner.xcworkspace
          pod install --repo-update
          cd ..

          # 1. Build preliminare
          flutter build ios --release --no-codesign --build-number=$BUILD_NUMBER
          
          # 2. Archiviazione (Qui si decide se la build vive o muore)
          echo "Avvio Archiviazione..."
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/ios/archive/Runner.xcarchive \
            archive \
            -allowProvisioningUpdates \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SKIP_INSTALL=NO || { echo "ARCHIVE FAILED"; exit 1; }
          
          # 3. Esportazione IPA
          echo "Avvio Esportazione IPA..."
          mkdir -p build/ios/ipa
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportOptionsPlist /Users/builder/export_options.plist \
            -exportPath build/ios/ipa || { echo "EXPORT FAILED"; exit 1; }
          
          # 4. Verifica e rinomina
          echo "Verifica file generati:"
          ls -R build/ios/ipa
          
          IPA_FILE=$(find build/ios/ipa -name "*.ipa" | head -n 1)
          if [ -z "$IPA_FILE" ]; then
            echo "ERRORE: Nessun file IPA trovato!"
            exit 1
          fi
          
          mv "$IPA_FILE" build/ios/ipa/alcione_scouting.ipa
          echo "IPA pronto per la pubblicazione."

    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true