workflows:
  ios-testflight-workflow:
    name: iOS TestFlight Build
    max_build_duration: 120
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: "Chiave Alcione"

    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials

    scripts:
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Hard Reset Pods
        script: |
          cd ios
          rm -rf Pods
          rm -rf Podfile.lock
          rm -rf Runner.xcworkspace
          pod deintegrate
          pod repo update
          pod install
      - name: Flutter build ipa
        script: |
          # Usiamo 'build ios' con l'opzione per i framework prima dell'ipa
          flutter build ios --release --no-codesign
          flutter build ipa --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true