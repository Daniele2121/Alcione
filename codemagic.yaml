workflows:
  ios-testflight-workflow:
    name: iOS TestFlight Build
    max_build_duration: 120
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: "Chiave Alcione"

    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials

    scripts:
      - name: Flutter Clean and Get
        script: |
          flutter clean
          flutter pub get
      - name: Install Pods
        script: |
          cd ios
          pod install --repo-update
      - name: Flutter Build iOS
        script: |
          # Generiamo l'app senza forzare l'archivio IPA qui, 
          # per evitare il blocco del "Development Team"
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/*.app

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true