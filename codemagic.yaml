workflows:
  ios-workflow:
    name: iOS Build & TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: GitHub_Actions_Key
    environment:
      groups:
        - app_store_credentials
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "it.alcione.scouting"
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          # Setup certificati (invio silenzioso)
          echo "$CERTIFICATE_PRIVATE_KEY" | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password "$APP_STORE_CONNECT_PASSWORD"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$APP_STORE_PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          
          # --- CORREZIONE CRASH STORYBOARD ---
          # Rimuoviamo ogni riferimento a UIMainStoryboardFile nel file plist prima della build
          /usr/libexec/PlistBuddy -c "Delete :UIMainStoryboardFile" ios/Runner/Info.plist || true
          
          # Pulizia riferimenti AppleFrameworkInfo (per errore 409)
          sed -i '' '/AppFrameworkInfo.plist in Resources/d' ios/Runner.xcodeproj/project.pbxproj
          xcode-project use-profiles

      - name: Install pods
        script: |
          flutter pub get
          cd ios
          # Pulizia profonda PODS per linkage statico
          rm -rf Pods Podfile.lock .symlinks Runner.xcworkspace
          pod install --repo-update
          cd ..

      - name: Build IPA
        script: |
          # 1. Pulizia totale Flutter
          flutter clean
          flutter pub get
          
          # 2. Build iOS senza firma (usa il numero build dinamico)
          flutter build ios --release --build-number=132 --no-codesign
          
          # 3. Archiviazione Xcode
          mkdir -p build/ios/archive
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/archive/Runner.xcarchive \
            archive \
            -allowProvisioningUpdates
          
          # 4. PULIZIA FINALE (Il "Segnale Positivo" contro l'errore 409)
          # Rimuoviamo la cartella App.framework dall'archivio prima di creare l'IPA
          # Con il linkage statico impostato nel Podfile, questo NON causerà crash
          find build/ios/archive/Runner.xcarchive -name "App.framework" -exec rm -rf {} +
          
          # 5. Esportazione IPA
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportOptionsPlist /Users/builder/export_options.plist \
            -exportPath build/ios/ipa
          
          find build/ios/ipa -name "*.ipa" -exec mv {} build/ios/ipa/alcione_scouting.ipa \;
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true