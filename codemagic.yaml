workflows:
  ios-testflight-workflow:
    name: iOS TestFlight Build
    max_build_duration: 120
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: "IL_NOME_DELLA_TUA_INTEGRAZIONE" # <--- SOSTITUISCI QUESTO

    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials # Il gruppo di variabili creato su Codemagic

    scripts:
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Install Pods
        script: |
          cd ios
          pod install
      - name: Flutter build ipa
        script: |
          # Questo comando crea il file .ipa pronto per l'invio
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Se l'app è nuova, Codemagic cercherà di caricarla direttamente