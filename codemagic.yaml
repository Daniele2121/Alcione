workflows:
  ios-testflight-workflow:
    name: iOS TestFlight Build
    max_build_duration: 120
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: "Chiave Alcione"

    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials

    scripts:
      - name: Flutter Clean and Get
        script: |
          flutter clean
          flutter pub get
      - name: Fix Firebase Imports (The "Sed" Surgeon)
        script: |
          # 1. Genera il file incriminato
          flutter build ios --release --no-codesign --config-only
          
          # 2. Trasforma gli @import in #import classici che Xcode digerisce meglio
          cd ios/Runner
          sed -i '' 's/@import cloud_firestore;/#import <cloud_firestore\/FLTFirebaseFirestorePlugin.h>/' GeneratedPluginRegistrant.m
          sed -i '' 's/@import firebase_auth;/#import <firebase_auth\/FLTFirebaseAuthPlugin.h>/' GeneratedPluginRegistrant.m
          sed -i '' 's/@import firebase_core;/#import <firebase_core\/FLTFirebaseCorePlugin.h>/' GeneratedPluginRegistrant.m
          sed -i '' 's/@import firebase_messaging;/#import <firebase_messaging\/FLTFirebaseMessagingPlugin.h>/' GeneratedPluginRegistrant.m
          echo "Imports fixed successfully!"
      - name: Install Pods
        script: |
          cd ios
          pod install --repo-update
      - name: Flutter build ipa
        script: |
          # Build finale dell'IPA senza firma (gestita da Codemagic Publishing)
          flutter build ipa --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true