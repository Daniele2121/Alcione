workflows:
  ios-testflight-workflow:
    name: iOS TestFlight Build
    max_build_duration: 120
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: "Chiave Alcione"

    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials

    scripts:
      - name: Flutter Clean and Get
        script: |
          flutter clean
          flutter pub get
      - name: Align Project Version
        script: |
          # Allinea forzatamente la versione iOS in tutti i file di progetto
          find . -type f -name "*.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' {} +
      - name: Install Pods
        script: |
          cd ios
          pod install --repo-update
      - name: Flutter Build
        script: |
          # Usiamo 'build ios' invece di 'build ipa' per bypassare il controllo moduli rigido
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/*.app

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true