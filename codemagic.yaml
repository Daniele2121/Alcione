workflows:
  ios-workflow:
    name: iOS TestFlight Build
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials # Assicurati che il gruppo su Codemagic si chiami così
      vars:
        BUNDLE_ID: "it.alcione.scouting"

    scripts:
      - name: Flutter Clean and Get
        script: |
          flutter clean
          flutter pub get

      - name: Prepare iOS Configuration
        script: |
          # Genera i file bridge e pulisce i link corrotti di Windows
          touch ios/Runner/GeneratedPluginRegistrant.h
          touch ios/Runner/GeneratedPluginRegistrant.m
          flutter precache --ios

      - name: Install CocoaPods
        script: |
          cd ios
          rm -rf Pods
          rm -rf Podfile.lock
          rm -f Flutter/Generated.xcconfig
          # Questo rigenera il config corretto per il Mac
          flutter build ios --config-only --no-codesign
          pod install --repo-update
          cd ..

      - name: Flutter Build iOS
        script: |
          # Build dell'IPA senza firma immediata (la firma avviene nel publishing)
          flutter build ios --release --no-codesign --build-number=$BUILD_NUMBER

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true