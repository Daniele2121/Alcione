workflows:
  ios-workflow:
    name: iOS Build & TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: GitHub_Actions_Key
    environment:
      groups:
        - app_store_credentials
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "it.alcione.scouting"
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          
          # 1. Decodifica il certificato P12
          echo "$CERTIFICATE_PRIVATE_KEY" | base64 --decode > /tmp/certificate.p12
          
          # 2. Importa il certificato usando la password configurata
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password "$APP_STORE_CONNECT_PASSWORD"
          
          # 3. Installa il Provisioning Profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$APP_STORE_PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          
          # 4. Forza la firma manuale nel progetto Xcode
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = ".*";/PROVISIONING_PROFILE_SPECIFIER = "";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = ".*";/CODE_SIGN_STYLE = "Manual";/g' ios/Runner.xcodeproj/project.pbxproj
          
          # 5. Prepara le opzioni di export (genera export_options.plist)
          xcode-project use-profiles

      - name: Install pods
        script: |
          cd ios
          rm -rf Pods Podfile.lock Runner.xcworkspace
          pod install --repo-update
          cd ..

      - name: Build IPA and FIX CRASH
        script: |
          flutter clean
          flutter pub get
          
          # 1. Generiamo l'IPA standard (che purtroppo include il file problematico)
          flutter build ipa --release --build-number=$BUILD_NUMBER --export-options-plist=/Users/builder/export_options.plist

          # 2. FIX CHIRURGICO (Metodo zip -d)
          # Entriamo nella cartella dove Flutter ha creato l'IPA
          cd build/ios/ipa
          IPA_FILE=$(ls *.ipa | head -n 1)
          
          echo "Riparazione bundle per Apple: rimuovo il file illegale da $IPA_FILE..."
          
          # Rimuoviamo il file 'App' dentro App.framework direttamente dall'archivio IPA
          # Questo risolve l'errore 409 Validation Failed senza rompere la firma
          zip -d "$IPA_FILE" "Payload/Runner.app/Frameworks/App.framework/App" || echo "File già rimosso o non trovato, procedo..."
          
          # 3. Rinominiamo il file per il publishing di Codemagic
          mv "$IPA_FILE" alcione_scouting.ipa
          echo "Riparazione completata correttamente."

    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true