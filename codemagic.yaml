workflows:
  ios-workflow:
    name: iOS Build & TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: GitHub_Actions_Key
    environment:
      groups:
        - app_store_credentials
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "it.alcione.scouting"
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          
          # Decodifica il certificato P12
          echo "$CERTIFICATE_PRIVATE_KEY" | base64 --decode > /tmp/certificate.p12
          
          # Importa il certificato usando la password che hai appena aggiunto
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password "$APP_STORE_CONNECT_PASSWORD"
          
          # Installa il Provisioning Profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$APP_STORE_PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          
          # Pulisce i riferimenti Xcode per forzare la firma manuale
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = ".*";/PROVISIONING_PROFILE_SPECIFIER = "";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = ".*";/CODE_SIGN_STYLE = "Manual";/g' ios/Runner.xcodeproj/project.pbxproj
          
          # Applica i profili
          xcode-project use-profiles
      - name: Install pods
        script: |
          cd ios
          rm -rf Pods Podfile.lock Runner.xcworkspace
          pod install --repo-update
          cd ..

      - name: Build IPA and FIX CRASH
        script: |
          flutter clean
          flutter pub get
          
          # 1. Creiamo l'archivio Xcode (senza generare l'IPA)
          flutter build ipa --release --build-number=$BUILD_NUMBER --no-type-check --no-pub --archive-only

          # 2. Individuiamo l'archivio appena creato
          ARCHIVE_PATH=$(find build/ios/archive -name "*.xcarchive")
          APP_PATH="$ARCHIVE_PATH/Products/Applications/Runner.app"
          
          # 3. FIX STRUTTURA: Rimuoviamo il binario non ammesso dall'App.framework
          if [ -f "$APP_PATH/Frameworks/App.framework/App" ]; then
            echo "Riparazione bundle App.framework nell'archivio..."
            rm -f "$APP_PATH/Frameworks/App.framework/App"
          fi

          # 4. Generiamo l'IPA dall'archivio RIPARATO
          # Questo comando usa l'exportOptions generato da Codemagic
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist /Users/builder/export_options.plist \
            -exportPath build/ios/ipa

          # 5. Rinominiamo il file per il publishing di Codemagic (se necessario)
          # Codemagic cerca un file .ipa nella cartella build/ios/ipa
          mv build/ios/ipa/*.ipa build/ios/ipa/alcione_scouting.ipa

    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true