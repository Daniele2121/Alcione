workflows:
  ios-workflow:
    name: iOS Build & TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: GitHub_Actions_Key
    environment:
      groups:
        - app_store_credentials
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "it.alcione.scouting"
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          echo "$CERTIFICATE_PRIVATE_KEY" | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password "$APP_STORE_CONNECT_PASSWORD"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$APP_STORE_PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          
          # --- CORREZIONE CRASH STORYBOARD ---
          /usr/libexec/PlistBuddy -c "Delete :UIMainStoryboardFile" ios/Runner/Info.plist || true
          
          # Pulizia riferimenti AppleFrameworkInfo (per errore 409)
          sed -i '' '/AppFrameworkInfo.plist in Resources/d' ios/Runner.xcodeproj/project.pbxproj
          xcode-project use-profiles

      - name: Install pods
        script: |
          flutter pub get
          cd ios
          # Pulizia profonda per evitare conflitti di memoria (SIGSEGV)
          rm -rf Pods Podfile.lock .symlinks Runner.xcworkspace
          pod install --repo-update
          cd ..
      - name: Build IPA
        script: |
          # 1. Pulizia totale (anche dei dati di cache di Xcode)
          flutter clean
          flutter pub get
          rm -rf ios/Pods ios/Podfile.lock
          rm -rf ~/Library/Developer/Xcode/DerivedData/*

          # 2. Re-installazione Pods
          cd ios && pod install && cd ..

          # 3. Build iOS (usiamo --no-codesign per gestire la firma dopo)
          flutter build ios --release --no-codesign --build-number=$BUILD_NUMBER

          # 4. Archiviazione Xcode (Aggiunti flag per evitare conflitti di file duplicati)
          mkdir -p build/ios/archive
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/ios/archive/Runner.xcarchive \
            archive \
            -allowProvisioningUpdates \
            COMPILER_INDEX_STORE_ENABLE=NO \
            -parallelizeTargets \
            -quiet
          
          # 5. Fix Errore 409
          find build/ios/archive/Runner.xcarchive -name "AppFrameworkInfo.plist" -delete
          
          # 6. Esportazione IPA
          mkdir -p build/ios/ipa
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportOptionsPlist /Users/builder/export_options.plist \
            -exportPath build/ios/ipa \
            -quiet
          
          find build/ios/ipa -name "*.ipa" -exec mv {} build/ios/ipa/alcione_scouting.ipa \;

    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true