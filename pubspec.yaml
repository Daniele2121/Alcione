name: alcione_scouting
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+10

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- FIREBASE AGGIORNATO (Fix per errore -G) ---
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0

  # --- ALTRE DIPENDENZE ---
  pdf: ^3.10.8
  printing: ^5.11.1
  shared_preferences: ^2.2.2
  flutter_slidable: ^3.0.1
  fl_chart: ^0.66.0
  cached_network_image: ^3.3.0
  intl: ^0.18.1
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^3.0.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo_alcione.png"

flutter:
  uses-material-design: true
  assets:
    - assets/