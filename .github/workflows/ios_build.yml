name: iOS Build Test

on:
  push:
    branches: [ main ]

jobs:
  build_ios:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4

      - name: Installa Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Usiamo l'ultima versione per supportare Google Fonts e Firebase 6.x
          flutter-version: '3.29.0' 

      - name: Pulisci e Installa dipendenze
        run: |
          flutter clean
          flutter pub get

      - name: Configura Certificati e Profilo
        env:
          P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          PROVISION_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          # Crea il portachiavi temporaneo
          security create-keychain -p "" build.keychain
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain

          # Importa il certificato P12
          echo $P12_BASE64 | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain

          # Importa il Provisioning Profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo $PROVISION_BASE64 | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/testflight.mobileprovision

      - name: Compila IPA per TestFlight
        run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist
