name: iOS Build Test

on:
  push:
    branches: [ main ]

jobs:
  build_ios:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4

      - name: Installa Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Pulisci e Installa dipendenze
        run: |
          flutter clean
          flutter pub get

      - name: Configura Certificati e Profilo
        run: |
          # 1. Creazione Keychain temporaneo
          security create-keychain -p "build" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # 2. Importazione Certificato P12
          # Usiamo le doppie virgolette per i Secret per evitare problemi con caratteri speciali
          echo "${{ secrets.IOS_P12_BASE64 }}" | base64 --decode > certificate.p12
          
          # Importazione forzata con password esplicita
          security import certificate.p12 -k build.keychain -P "${{ secrets.IOS_P12_PASSWORD }}" -T /usr/bin/codesign -T /usr/bin/security -A
          
          # 3. Autorizzazione all'uso della chiave (evita i popup di blocco)
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "build" build.keychain

          # 4. Importazione Provisioning Profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/testflight.mobileprovision
          
          # Pulizia file temporaneo per sicurezza
          rm certificate.p12

      - name: Compila IPA per TestFlight
        run: |
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist
