name: iOS TestFlight Build
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Apple Certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.P12_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}
          create-keychain: true

      - name: Install Provisioning Profile
        run: |
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            # Usa printf invece di echo per evitare corruzioni del file
            printf "%s" "${{ secrets.PROVISIONING_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/Alcione_TestFlight_2026.mobileprovision

      - name: Build and Export IPA
        run: |
          flutter pub get
          
          cd ios
          rm -rf Pods Podfile.lock Runner.xcworkspace
          pod deintegrate
          pod install --repo-update
          cd ..
          
          # Build Flutter
          flutter build ios --release --no-codesign --build-number=$GITHUB_RUN_NUMBER
          
          # Archivio Xcode (Aggiunto -quiet)
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/archive/Runner.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            -quiet
          
          # Pulizia framework statici
          rm -rf build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app/Frameworks/App.framework
          rm -rf build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app/Frameworks/Flutter.framework
          
          # Export Finale (Aggiunto -quiet)
          mkdir -p build/ios/testflight
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath build/ios/testflight \
            -exportOptionsPlist ios/ExportOptions.plist \
            -quiet
          
          find build/ios/testflight -name "*.ipa" -exec mv {} build/ios/testflight/Runner.ipa \;

      - name: Upload to TestFlight
        run: |
            # Crea la cartella dove Apple cerca SEMPRE le chiavi
            mkdir -p ~/.private_keys
            
            # Salva la chiave col nome corretto (AuthKey_ seguito dall'ID)
            echo "${{ secrets.APPSTORE_P8_KEY }}" > ~/.private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8
            
            # Usa xcrun altool con i parametri corretti
            xcrun altool --upload-app --type ios \
              -f build/ios/testflight/Runner.ipa \
              --apiKey "${{ secrets.APPSTORE_KEY_ID }}" \
              --apiIssuer "${{ secrets.APPSTORE_ISSUER_ID }}"