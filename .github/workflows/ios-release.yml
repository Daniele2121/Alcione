name: iOS TestFlight Build
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy to TestFlight
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Apple Certificate
        env:
          CERTIFICATE_CER: ${{ secrets.IOS_CERTIFICATE_CER }}
          PRIVATE_KEY: ${{ secrets.IOS_PRIVATE_KEY }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          cat <<EOF | tr -d '\r\n ' | base64 --decode > distribution.cer
          $CERTIFICATE_CER
          EOF
          cat <<EOF | tr -d '\r\n ' | base64 --decode > private.key
          $PRIVATE_KEY
          EOF
          openssl x509 -inform DER -in distribution.cer -out distribution.pem
          openssl pkcs12 -export -out certificate.p12 -inkey private.key -in distribution.pem -passout pass:$P12_PASSWORD
          security create-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Install Provisioning Profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cat <<EOF | tr -d '\r\n ' | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          $PROVISIONING_PROFILE
          EOF

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: |
          # 1. Reset totale per evitare conflitti di cache su GitHub
          flutter clean
          flutter pub get
          flutter precache --ios
          
          # 2. Pulizia manuale della cartella iOS
          cd ios
          rm -rf Pods
          rm -rf .symlinks
          rm -f Podfile.lock
          
          # 3. Forza l'aggiornamento dei repository di CocoaPods
          pod repo update
          
          # 4. Update specifico per i plugin Firebase che danno errore
          pod update cloud_firestore firebase_core firebase_auth firebase_messaging
          
          # 5. Installazione finale
          pod install
          cd ..

      - name: Build IPA
        run: |
          # Forziamo il target anche nel comando di build per sicurezza
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist --no-codesign IPHONEOS_DEPLOYMENT_TARGET=13.0

      - name: Upload to TestFlight
        env:
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_P8_KEY: ${{ secrets.APPSTORE_P8_KEY }}
        run: |
          echo "$APPSTORE_P8_KEY" > auth_key.p8
          xcrun altool --upload-app --type ios -f build/ios/ipa/*.ipa --apiKey "$APPSTORE_KEY_ID" --apiIssuer "$APPSTORE_ISSUER_ID"