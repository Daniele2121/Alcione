name: iOS TestFlight Build
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Apple Certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.P12_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}
          create-keychain: true

      - name: Install Provisioning Profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          printf "%s" "${{ secrets.PROVISIONING_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/Alcione_TestFlight_2026.mobileprovision

      - name: Build and Export IPA
        run: |
          # 1. Pulizia e preparazione dipendenze
          flutter pub get
          
          cd ios
          rm -rf Pods Podfile.lock Runner.xcworkspace
          pod deintegrate
          
          # 2. FIX PER 'GeneratedPluginRegistrant': Forza la generazione dei file
          flutter build ios --release --no-codesign --config-only
          
          # 3. Installazione Pods
          pod install --repo-update
          cd ..
          
          # 4. Build Flutter completa
          flutter build ios --release --no-codesign --build-number=$GITHUB_RUN_NUMBER
          
          # 5. Archivio Xcode (Forza firma e team)
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/archive/Runner.xcarchive \
            archive \
            DEVELOPMENT_TEAM=FGA2TB9993 \
            PROVISIONING_PROFILE_SPECIFIER="Alcione_TestFlight_2026" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            -quiet
          
          # 6. FIX PER IL CRASH (Pulizia Frameworks Statici)
          # Poiché usiamo il linkage statico, svuotiamo la cartella Frameworks
          rm -rf build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app/Frameworks/*
          
          # 7. Export Finale dell'IPA
          mkdir -p build/ios/testflight
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath build/ios/testflight \
            -exportOptionsPlist ios/ExportOptions.plist \
            -quiet
          
          # Rinomina l'IPA per lo step successivo
          find build/ios/testflight -name "*.ipa" -exec mv {} build/ios/testflight/Runner.ipa \;

      - name: Upload to TestFlight
        run: |
          mkdir -p ~/.private_keys
          echo "${{ secrets.APPSTORE_P8_KEY }}" > ~/.private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8
          
          xcrun altool --upload-app --type ios \
            -f build/ios/testflight/Runner.ipa \
            --apiKey "${{ secrets.APPSTORE_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPSTORE_ISSUER_ID }}"