name: iOS TestFlight Build
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Apple Certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.P12_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}
          create-keychain: true

      - name: Install Provisioning Profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/Alcione_TestFlight_2026.mobileprovision

      - name: Build IPA
        run: |
          flutter pub get
          cd ios
          pod install --repo-update
          cd ..
          
          # 1. Build standard
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist --build-number=$GITHUB_RUN_NUMBER
          
          # 2. Creiamo una cartella fissa e ci copiamo l'IPA per l'upload
          mkdir -p build/ios/testflight
          find build/ios/ipa -name "*.ipa" -exec cp {} build/ios/testflight/Runner.ipa \;
          
          # Verifica rapida
          if [ -f "build/ios/testflight/Runner.ipa" ]; then
            echo "IPA creato con successo in build/ios/testflight/Runner.ipa"
          else
            echo "ERRORE: IPA non trovato dopo la build"
            exit 1
          fi

      - name: Upload to TestFlight
        env:
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_P8_TEXT: ${{ secrets.APPSTORE_P8_KEY }}
        run: |
          # 1. Configura la chiave API
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPSTORE_P8_TEXT" > ~/.appstoreconnect/private_keys/AuthKey_$APPSTORE_KEY_ID.p8
          
          # 2. Percorso blindato
          IPA_PATH="build/ios/testflight/Runner.ipa"
          echo "Caricamento del file: $IPA_PATH"
          
          # 3. Caricamento effettivo
          xcrun altool --upload-app --type ios \
            -f "$IPA_PATH" \
            --apiKey "$APPSTORE_KEY_ID" \
            --apiIssuer "$APPSTORE_ISSUER_ID"