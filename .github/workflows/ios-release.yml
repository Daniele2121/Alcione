name: iOS TestFlight Build
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Apple Certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.P12_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}
          create-keychain: true

      - name: Install Provisioning Profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          printf "%s" "${{ secrets.PROVISIONING_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/Alcione_TestFlight_2026.mobileprovision

      - name: Build and Export IPA
        run: |
          flutter pub get
          
          cd ios
          rm -rf Pods Podfile.lock Runner.xcworkspace
          pod deintegrate
          
          # FORZA LA GENERAZIONE DEI FILE DEI PLUGIN
          flutter build ios --release --no-codesign --config-only
          
          pod install --repo-update
          cd ..
          
          # Build Flutter (aggiungiamo --pub per sicurezza)
          flutter build ios --release --no-codesign --build-number=$GITHUB_RUN_NUMBER
          
          # ... resto del codice (xcodebuild, ecc.)

      - name: Upload to TestFlight
        run: |
          mkdir -p ~/.private_keys
          echo "${{ secrets.APPSTORE_P8_KEY }}" > ~/.private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8
          
          xcrun altool --upload-app --type ios \
            -f build/ios/testflight/Runner.ipa \
            --apiKey "${{ secrets.APPSTORE_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPSTORE_ISSUER_ID }}"