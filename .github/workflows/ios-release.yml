name: iOS TestFlight Build
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy to TestFlight
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Apple Certificate
        # ... (Mantieni il tuo codice originale qui)

      - name: Install Provisioning Profile
        # ... (Mantieni il tuo codice originale qui)

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: |
          flutter pub get
          cd ios
          rm -rf Pods
          rm -f Podfile.lock
          pod install --repo-update
          cd ..

      # --- QUESTA È LA MODIFICA CRUCIALE ---
      - name: Force Patch Firebase Messaging Header
        run: |
          # 1. Modifica il plugin nella cache di Flutter scaricata su GitHub
          find /Users/runner/.pub-cache/hosted/pub.dev -name "FLTFirebaseMessagingPlugin.h" -exec sed -i '' 's/<Firebase\/Firebase.h>/"Firebase.h"/g' {} + || true
          
          # 2. Modifica il plugin già installato nella cartella Pods
          find ios/Pods -name "FLTFirebaseMessagingPlugin.h" -exec sed -i '' 's/<Firebase\/Firebase.h>/"Firebase.h"/g' {} + || true

      - name: Build IPA
        run: |
          # Ora la build userà i file che abbiamo appena "patchato" a mano
          flutter build ipa --release --no-codesign --no-update-dependencies

      - name: Upload to TestFlight
        env:
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_P8_KEY: ${{ secrets.APPSTORE_P8_KEY }}
        run: |
          mkdir -p ~/.private_keys
          echo "$APPSTORE_P8_KEY" > ~/.private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8
          
          xcrun altool --upload-app --type ios \
            -f build/ios/ipa/*.ipa \
            --apiKey "$APPSTORE_KEY_ID" \
            --apiIssuer "$APPSTORE_ISSUER_ID"