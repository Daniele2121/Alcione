name: iOS TestFlight Build
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Apple Certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.P12_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}
          create-keychain: true

      - name: Install Provisioning Profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/Alcione_TestFlight_2026.mobileprovision

      - name: Build and Export IPA
        run: |
          flutter pub get
          
          cd ios
          # 1. Pulizia totale per evitare conflitti tra build dinamiche e statiche
          rm -rf Pods Podfile.lock Runner.xcworkspace
          pod deintegrate
          pod install --repo-update
          cd ..
          
          # 2. Build Flutter (Prepara i file necessari)
          flutter build ios --release --no-codesign --build-number=$GITHUB_RUN_NUMBER
          
          # 3. Creazione Archivio Xcode
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/archive/Runner.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES
          
          # --- FIX CRUCIALE PER APPLE VALIDATION (Errore 409) ---
          # Poiché usiamo il linkage statico nel Podfile, dobbiamo rimuovere i framework
          # "fantasma" che Apple scambia per eseguibili non validi.
          echo "Pulizia framework statici per validazione Apple..."
          rm -rf build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app/Frameworks/App.framework
          rm -rf build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app/Frameworks/Flutter.framework
          # ------------------------------------------------------
          
          # 4. Export Finale (Generazione IPA)
          mkdir -p build/ios/testflight
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath build/ios/testflight \
            -exportOptionsPlist ios/ExportOptions.plist
          
          # Rinomina per l'upload
          find build/ios/testflight -name "*.ipa" -exec mv {} build/ios/testflight/Runner.ipa \;

      - name: Upload to TestFlight
        env:
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_P8_TEXT: ${{