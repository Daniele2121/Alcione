name: iOS TestFlight Build
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy to TestFlight
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Apple Certificate
        env:
          CERTIFICATE_CER: ${{ secrets.IOS_CERTIFICATE_CER }}
          PRIVATE_KEY: ${{ secrets.IOS_PRIVATE_KEY }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          security create-keychain -p "" build.keychain
          echo "$CERTIFICATE_CER" | base64 --decode > distribution.cer
          echo "$PRIVATE_KEY" | base64 --decode > private.key
          openssl x509 -inform DER -in distribution.cer -out distribution.pem
          openssl pkcs12 -export -out certificate.p12 -inkey private.key -in distribution.pem -passout pass:$P12_PASSWORD
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Install Provisioning Profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: |
          flutter pub get
          cd ios
          rm -rf Pods
          rm -f Podfile.lock
          pod install --repo-update
          cd ..

      - name: Force Patch Firebase Messaging Header
        run: |
          # Patch manuale per bypassare il controllo non-modular header di Xcode 16+
          find /Users/runner/.pub-cache/hosted/pub.dev -name "FLTFirebaseMessagingPlugin.h" -exec sed -i '' 's/<Firebase\/Firebase.h>/"Firebase.h"/g' {} + || true
          find ios/Pods -name "FLTFirebaseMessagingPlugin.h" -exec sed -i '' 's/<Firebase\/Firebase.h>/"Firebase.h"/g' {} + || true

      - name: Build iOS App
        run: |
          # --no-pub impedisce a Flutter di rigenerare i file e sovrascrivere il nostro Podfile/Patch
          flutter build ios --release --no-codesign --no-pub

      - name: Upload to TestFlight
        env:
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_P8_KEY: ${{ secrets.APPSTORE_P8_KEY }}
        run: |
          mkdir -p ~/.private_keys
          echo "$APPSTORE_P8_KEY" > ~/.private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8
          
          # Carichiamo l'app compilata (altool accetta .app o .ipa, qui usiamo l'output di build ios)
          xcrun altool --upload-app --type ios \
            -f build/ios/iphoneos/Runner.app \
            --apiKey "$APPSTORE_KEY_ID" \
            --apiIssuer "$APPSTORE_ISSUER_ID"