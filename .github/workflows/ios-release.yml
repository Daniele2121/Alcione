name: iOS TestFlight Build
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Apple Certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.P12_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}
          create-keychain: true # Crea e sblocca il portachiavi su macOS

      - name: Install Provisioning Profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/Alcione_TestFlight_2026.mobileprovision

      - name: Build IPA
        run: |
          # 1. Sblocca il portachiavi e rimuovi il timeout (fondamentale!)
          security set-keychain-settings -lut 21600 login.keychain
          security unlock-keychain -p "" login.keychain
          
          # 2. Forza la firma manuale nel file di progetto
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          
          # 3. Pulizia e build con parametri di Team ID espliciti
          flutter pub get
          cd ios
          pod install --repo-update
          cd ..
          
          # Lancio della build passando il Team ID (FGA2TB9993) direttamente al compilatore
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist \
            --build-name=1.0.0 \
            --build-number=$GITHUB_RUN_NUMBER

      - name: Upload to TestFlight
        env:
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_P8_TEXT: ${{ secrets.APPSTORE_P8_KEY }}
        run: |
          # Configura la chiave API P8 per l'autenticazione
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPSTORE_P8_TEXT" > ~/.appstoreconnect/private_keys/AuthKey_$APPSTORE_KEY_ID.p8
          
          # Caricamento su App Store Connect
          xcrun altool --upload-app --type ios \
            -f build/ios/ipa/*.ipa \
            --apiKey "$APPSTORE_KEY_ID" \
            --apiIssuer "$APPSTORE_ISSUER_ID"