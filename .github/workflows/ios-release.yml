name: iOS TestFlight Build
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy to TestFlight
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Apple Certificate
        # ... (Mantieni il tuo codice originale qui, è corretto)

      - name: Install Provisioning Profile
        # ... (Mantieni il tuo codice originale qui, è corretto)

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: |
          flutter pub get
          cd ios
          # Pulizia profonda per garantire che i nostri fix nel Podfile vengano letti
          rm -rf Pods
          rm -f Podfile.lock
          pod install --repo-update
          cd ..

      - name: Build IPA
        run: |
          # Il flag --no-update-dependencies impedisce a Flutter di sovrascrivere il nostro Podfile
          flutter build ipa --release --no-codesign --no-update-dependencies

      - name: Upload to TestFlight
        env:
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_P8_KEY: ${{ secrets.APPSTORE_P8_KEY }}
        run: |
          # 1. Crea la cartella per la chiave API richiesta da Apple
          mkdir -p ~/.private_keys
          echo "$APPSTORE_P8_KEY" > ~/.private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8
          
          # 2. Upload del file .ipa (non .app) usando l'API Key
          xcrun altool --upload-app --type ios \
            -f build/ios/ipa/*.ipa \
            --apiKey "$APPSTORE_KEY_ID" \
            --apiIssuer "$APPSTORE_ISSUER_ID"