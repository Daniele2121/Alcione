name: iOS TestFlight Build
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Apple Certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.P12_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}
          create-keychain: true

      - name: Install Provisioning Profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          # Usa il nome esatto che abbiamo messo nel project.pbxproj e ExportOptions
          echo "${{ secrets.PROVISIONING_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/Alcione_TestFlight_2026.mobileprovision

      - name: Build and Export IPA
        run: |
          # 1. Setup iniziale
          flutter pub get
          cd ios
          echo "Forzo la modalità solo iPhone..."
          sed -i '' 's/TARGETED_DEVICE_FAMILY = "1,2"/TARGETED_DEVICE_FAMILY = 1/g' Runner.xcodeproj/project.pbxproj
          rm -rf Pods
          rm -f Podfile.lock
          pod install --repo-update
          cd ..
          
          # 2. Build
          flutter clean
          flutter pub get
          flutter build ipa --release --no-codesign --build-number=$GITHUB_RUN_NUMBER

          # 3. FIX CHIRURGICO (Per errore 409 senza svuotare l'app)
          ARCHIVE_PATH="build/ios/archive/Runner.xcarchive"
          APP_PATH="$ARCHIVE_PATH/Products/Applications/Runner.app"
          
          echo "Pulizia bundle incriminati..."
          # Rimuoviamo SOLO il file standalone 'App' che Apple rifiuta
          # ma NON tocchiamo il resto di App.framework o Flutter.framework
          if [ -f "$APP_PATH/Frameworks/App.framework/App" ]; then
            rm "$APP_PATH/Frameworks/App.framework/App"
            echo "File App rimosso con successo."
          fi

          # Pulizia firme per evitare conflitti durante l'export
          if [ -d "$APP_PATH/Frameworks" ]; then
            find "$APP_PATH/Frameworks" -name "*.framework" -exec codesign --remove-signature {} +
          fi

          # Conformità crittografica
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$APP_PATH/Info.plist" || \
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$APP_PATH/Info.plist"

          # 4. Export finale
          mkdir -p build/ios/testflight
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath build/ios/testflight \
            -exportOptionsPlist ios/ExportOptions.plist \
            CODE_SIGNING_ALLOWED=NO

          mv build/ios/testflight/*.ipa build/ios/testflight/Runner.ipa

      - name: Upload to TestFlight
        env:
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_P8_TEXT: ${{ secrets.APPSTORE_P8_KEY }}
        run: |
          # Setup della chiave API per altool
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPSTORE_P8_TEXT" > ~/.appstoreconnect/private_keys/AuthKey_$APPSTORE_KEY_ID.p8
          
          # Caricamento su TestFlight
          xcrun altool --upload-app --type ios \
            -f build/ios/testflight/Runner.ipa \
            --apiKey "$APPSTORE_KEY_ID" \
            --apiIssuer "$APPSTORE_ISSUER_ID"