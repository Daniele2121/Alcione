name: iOS TestFlight Build
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy to TestFlight
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Aggiornato alla v4

      - name: Install Apple Certificate
        env:
          CERTIFICATE_CER: ${{ secrets.IOS_CERTIFICATE_CER }}
          PRIVATE_KEY: ${{ secrets.IOS_PRIVATE_KEY }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          # Installazione certificati standard
          security create-keychain -p "" build.keychain
          echo "$CERTIFICATE_CER" | base64 --decode > distribution.cer
          echo "$PRIVATE_KEY" | base64 --decode > private.key
          openssl x509 -inform DER -in distribution.cer -out distribution.pem
          openssl pkcs12 -export -out certificate.p12 -inkey private.key -in distribution.pem -passout pass:$P12_PASSWORD
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Install Provisioning Profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Rimosso il numero di versione specifico per evitare conflitti con Dart

      - name: Install dependencies
        run: |
          flutter pub get
          cd ios
          rm -rf Pods
          rm -f Podfile.lock
          pod install --repo-update
          cd ..

      - name: Build IPA
        run: |
          flutter build ios --release --no-codesign --no-update-dependencies

      - name: Upload to TestFlight
        env:
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_P8_KEY: ${{ secrets.APPSTORE_P8_KEY }}
        run: |
          # Salvataggio chiave p8 e upload
          echo "$APPSTORE_P8_KEY" > auth_key.p8
          xcrun altool --upload-app --type ios -f build/ios/iphoneos/Runner.app --apiKey "$APPSTORE_KEY_ID" --apiIssuer "$APPSTORE_ISSUER_ID"