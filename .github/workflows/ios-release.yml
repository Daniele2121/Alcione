name: iOS TestFlight Build
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Apple Certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.P12_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}
          create-keychain: true

      - name: Install Provisioning Profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/Alcione_TestFlight_2026.mobileprovision

      - name: Build and Export IPA
        run: |
          # Sincronizzazione dipendenze
          flutter pub get
          
          cd ios
          # Pulizia profonda per evitare conflitti gRPC/Firebase
          rm -rf Pods Podfile.lock Runner.xcworkspace
          pod install --repo-update
          
          # Fix: Assicuriamoci che il target sia solo iPhone (come richiesto)
          sed -i '' 's/TARGETED_DEVICE_FAMILY = "1,2"/TARGETED_DEVICE_FAMILY = 1/g' Runner.xcodeproj/project.pbxproj
          cd ..
          
          # 1. Build Flutter Release (Genera i framework necessari)
          flutter build ios --release --no-codesign --build-number=$GITHUB_RUN_NUMBER

          # 2. Archivio Xcode (Crea il pacchetto .xcarchive)
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/archive/Runner.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO

          # --- FIX CRASH ALL'AVVIO ---
          # Rimuoviamo i framework duplicati che causano il blocco su TestFlight 
          # ma manteniamo quelli statici gestiti da CocoaPods
          ARCHIVE_PATH="build/ios/archive/Runner.xcarchive"
          APP_PATH="$ARCHIVE_PATH/Products/Applications/Runner.app"
          
          echo "Rimozione framework ridondanti per evitare crash..."
          rm -rf "$APP_PATH/Frameworks/App.framework"
          rm -rf "$APP_PATH/Frameworks/Flutter.framework"

          # 3. Export Finale in IPA
          mkdir -p build/ios/testflight
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath build/ios/testflight \
            -exportOptionsPlist ios/ExportOptions.plist

          # Ricerca e rinomina IPA per l'upload
          find build/ios/testflight -name "*.ipa" -exec mv {} build/ios/testflight/Runner.ipa \;
          
          if [ -f build/ios/testflight/Runner.ipa ]; then
            echo "IPA generata con successo: build/ios/testflight/Runner.ipa"
          else
            echo "ERRORE: IPA non trovata."
            exit 1
          fi

      - name: Upload to TestFlight
        env:
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_P8_TEXT: ${{ secrets.APPSTORE_P8_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPSTORE_P8_TEXT" > ~/.appstoreconnect/private_keys/AuthKey_$APPSTORE_KEY_ID.p8
          
          xcrun altool --upload-app --type ios \
            -f build/ios/testflight/Runner.ipa \
            --apiKey "$APPSTORE_KEY_ID" \
            --apiIssuer "$APPSTORE_ISSUER_ID"